   <h4>Ordem do Foco</h4>
   
   <p class="conformance-level">A</p>
   
   <p>Se uma <a>página Web</a> puder ser <a>navegada sequencialmente</a> e as sequências de navegação afetarem o significado ou a operação, os componentes focáveis recebem o foco numa ordem que preserva o significado e a operabilidade.
   </p>
