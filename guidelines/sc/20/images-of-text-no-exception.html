<section id="images-of-text-no-exception" class="sc">
   
   <h4>Imagens de Texto (Sem Exceção)</h4>
   
   <p class="conformance-level">AAA</p>
   
   <p>As <a>imagens de texto</a> são utilizadas apenas para <a>decoração pura</a> ou quando uma apresentação específica de <a>texto</a> é <a>essencial</a> para a informação transmitida.
   </p>
   
   <p class="note">Os logótipos (texto que faz parte de um logótipo ou de uma marca) são considerados essenciais.</p>
   
</section>
