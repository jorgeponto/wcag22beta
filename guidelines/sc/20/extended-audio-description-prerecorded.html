<section id="extended-audio-description-prerecorded" class="sc">
   
   <h4>Audiodescrição Alargada (Pré-gravada)</h4>
   
   <p class="conformance-level">AAA</p>
   
   <p>Quando as pausas no áudio principal forem insuficientes para permitir que as <a>audiodescrições</a> transmitam o sentido do vídeo, é fornecida <a>audiodescrição alargada</a> para todo o conteúdo <a>vídeo</a> <a>pré-gravado</a> em <a>multimédia sincronizada</a>.
   </p>
   
</section>
