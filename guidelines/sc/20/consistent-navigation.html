   <h4>Navegação Consistente</h4>
   
   <p class="conformance-level">AA</p>
   
   <p>Os mecanismos de navegação que se repetem em várias <a>páginas Web</a> dentro de um <a>conjunto de páginas Web</a> surgem na <a>mesma ordem relativa</a> sempre que são repetidos, exceto quando uma alteração é iniciada pelo utilizador.
   </p>
