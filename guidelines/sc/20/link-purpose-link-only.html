   <h4>Finalidade da Ligação (Apenas Ligação)</h4>
   
   <p class="conformance-level">AAA</p>
   
  <p>Está disponível um <a>mecanismo</a> que permite identificar a <a>finalidade de cada ligação</a> apenas a partir do texto da ligação, exceto quando a finalidade da ligação for <a>ambígua para os utilizadores em geral</a>.
   </p>
