   <p class="conformance-level">AA</p>
   
   <p>O <a>idioma humano</a> de cada passagem ou expressão no conteúdo pode ser <a>determinado programaticamente</a>, exceto no caso de nomes próprios, termos técnicos, palavras de idioma indeterminado e palavras ou expressões que se tornaram parte do vernáculo do <a>texto</a> imediatamente envolvente.
