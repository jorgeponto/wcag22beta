<section id="label-in-name" class="sc">
   <h4>Etiqueta no Nome</h4>
   <p class="conformance-level">A</p>
   
  <p>Para <a>componentes da interface do utilizador</a> com <a>etiquetas</a> que incluam <a>texto</a> ou <a>imagens de texto</a>, o <a>nome</a> contém o texto que é apresentado visualmente.</p>

  <p class="note">Uma boa prática consiste em colocar o texto da etiqueta no início do nome.</p>
   
</section>
