<section id="concurrent-input-mechanisms" class="sc">
   <h4>Mecanismos de Entrada Concorrentes</h4>
   <p class="conformance-level">AAA</p>
  <p>O conteúdo Web não restringe a utilização das modalidades de entrada disponíveis numa plataforma, exceto quando a restrição é <a>essencial</a>, necessária para garantir a segurança do conteúdo ou necessária para respeitar as configurações do utilizador.</p>                 
</section>
