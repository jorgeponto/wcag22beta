<dt><dfn id="dfn-sign-language-interpretation">interpretação em língua gestual</dfn></dt>
<dd>
   
   <p>tradução de uma língua, geralmente uma língua falada, para uma <a>língua gestual</a></p>
   
   <p class="note">As verdadeiras línguas gestuais são línguas independentes que não estão relacionadas com a(s) língua(s) falada(s) do mesmo país ou região.
   </p>
   
</dd>
