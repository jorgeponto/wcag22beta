<dt><dfn id="dfn-images-of-text" data-lt="images of text">imagem de texto</dfn></dt>
<dd>
   
  <p>texto que foi apresentado numa forma não textual (por exemplo, uma imagem) para alcançar um determinado efeito visual
   </p>
   
   <p class="note">Isto não inclui texto que faz parte de uma imagem que contém outro conteúdo visual significativo.
   </p>
   
   <aside class="example"><p>O nome de uma pessoa num crachá numa fotografia.</p></aside>
   
</dd>
