<dt><dfn id="dfn-set-of-web-pages">conjunto de páginas Web</dfn></dt>
<dd>
   
   <p>coleção de <a>páginas Web</a> que partilham um objetivo comum e que são criadas pelo mesmo autor, grupo ou organização.</p>

   <p class="note">Versões em diferentes línguas seriam consideradas diferentes conjuntos de páginas Web.</p>
   
</dd>
