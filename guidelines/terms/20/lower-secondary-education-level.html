<dt><dfn id="dfn-lower-secondary-education-level">nível de ensino secundário inferior</dfn></dt>
<dd>
   
   <p>período de dois ou três anos de ensino que começa após a conclusão de seis anos de escolaridade e termina nove anos após o início do <a>ensino primário</a></p>
   
   <p class="note">Esta definição baseia-se na Classificação Internacional Tipo da Educação [[UNESCO]].
   </p>
   
</dd>
