<dt><dfn id="dfn-primary-education" data-lt="primary education">nível de ensino primário</dfn></dt>
<dd>
   
   <p>período de seis anos de ensino que começa entre os cinco e os sete anos de idade, possivelmente sem qualquer educação anterior
   </p>
   
   <p class="note">Esta definição baseia-se na Classificação Internacional Tipo da Educação [[UNESCO]].
   </p>
   
</dd>
