<dt><dfn id="dfn-pointer-inputs" data-lt="pointer inputs">entrada por ponteiro</dfn></dt>
<dd>
                  
   <p>entrada proveniente de um dispositivo que pode apontar para uma coordenada específica (ou conjunto de coordenadas) num ecrã,
      como um rato, uma caneta ou um contacto tátil
   </p>
   <p class="note">Consulte a <a href="https://www.w3.org/TR/pointerevents/#dfn-pointer">definição de "pointer" no Pointer Events</a> [[pointerevents]].</p>
               
</dd>
