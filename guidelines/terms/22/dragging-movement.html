<dt class="new"><dfn id="dfn-dragging-movements" data-lt="dragging movements">movimento de arrastar</dfn></dt>
<dd class="new">
    <p class="change">Novo</p>
                    
  <p>uma operação em que o ponteiro interage com um elemento no <a>evento de pressão</a> e o elemento (ou uma representação da sua posição) segue o ponteiro até um <a>evento de libertação</a></p>
   
   <p class="note">Exemplos de elementos arrastáveis incluem itens de lista, elementos de texto e imagens.</p>
</dd>
